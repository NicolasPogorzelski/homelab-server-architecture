services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main  # TODO: pin to specific version tag (currently tracking :main branch)
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - /var/lib/openwebui/data:/app/backend/data
