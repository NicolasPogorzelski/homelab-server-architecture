services:
  prometheus:
    image: prom/prometheus:latest  # TODO: pin to specific version tag
    container_name: prometheus
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROM_RETENTION}
      - --web.enable-lifecycle
      - --web.listen-address=${PROM_BIND_ADDRESS}:${PROM_PORT}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ${PROM_DATA}:/prometheus
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest  # TODO: pin to specific version tag
    container_name: grafana
    network_mode: host
    env_file:
      - ${GF_ENV_FILE}
    volumes:
      - ${GF_DATA}:/var/lib/grafana
      - ./grafana/provisioning/datasources/prometheus.yml:/var/lib/grafana/provisioning/datasources/prometheus.yml:ro
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest  # TODO: pin to specific version tag
    container_name: alertmanager
    network_mode: host
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=${AM_BIND_ADDRESS}:${AM_PORT}
      - --config.expand-env=true
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:latest  # TODO: pin to specific version tag
    container_name: node-exporter
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--web.listen-address=${NE_BIND_ADDRESS}:${NE_PORT}'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
