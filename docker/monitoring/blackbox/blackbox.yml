modules:
  # Plain HTTP services bound directly to a port (Jellyfin, Audiobookshelf).
  # "up" = the endpoint answered with a 2xx status.
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  # HTTPS services behind `tailscale serve` (Paperless, OpenWebUI, Nextcloud,
  # Calibre-Web, Vaultwarden). Reached by MagicDNS name on :443.
  # "up" = the service answered HTTP at all; auth redirects/denials still mean
  # the process is alive, so 3xx/401/403 count as up (not 5xx / no-response).
  http_service_up:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200, 301, 302, 401, 403]
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
