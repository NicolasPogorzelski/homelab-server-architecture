groups:
  - name: node
    rules:
      - alert: NodeDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for more than 2 minutes."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 15% free ({{ $value | printf \"%.1f\" }}% remaining)."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage on {{ $labels.instance }} is above 90% ({{ $value | printf \"%.1f\" }}% used)."

      - alert: PostgreSQLBackupStale
        expr: (time() - pg_backup_last_success_timestamp) > 90000
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL backup is stale"
          description: "Last successful pg_dumpall on CT260 was more than 25 hours ago."

  - name: postgres
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter cannot reach the database"
          description: "postgres_exporter on {{ $labels.instance }} reports pg_up=0 for more than 2 minutes. The database may be down or unreachable."

      - alert: PostgreSQLConnectionsHigh
        expr: sum by (instance) (pg_stat_activity_count{datname!~"template.*|postgres"}) / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection usage high on {{ $labels.instance }}"
          description: "Active connections exceed 80% of max_connections on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}% used)."

  - name: smart
    rules: []
    # SMART disk health alerts are planned but not yet implemented.
    # Requires smartctl_exporter on VM102 (TODO #6).
    # Metrics to alert on (once available):
    #   - smartctl_device_smart_status (overall SMART pass/fail)
    #   - smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct"} (bad sectors)
    #   - smartctl_device_attribute{attribute_name="Current_Pending_Sector"} (unstable sectors)
