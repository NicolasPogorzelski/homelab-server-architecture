services:
  calibreweb:
    image: lscr.io/linuxserver/calibre-web:0.6.26-ls386  # pinned to running version (2026-06-17)
    container_name: calibre-web
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${CW_BIND_ADDRESS}:${CW_PORT}:8083"
    volumes:
      - ${CW_CONFIG}:/config:rw
      - ${CW_BOOKS}:/books:ro
    restart: unless-stopped
