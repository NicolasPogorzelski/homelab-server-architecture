services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest  # TODO: pin to specific version tag
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "${ABS_HOST_PORT}:80"
    environment:
      - TZ=${TZ}
    volumes:
      - "${ABS_DATA_ROOT}/config:/config"
      - "${ABS_DATA_ROOT}/metadata:/metadata"
      - "${ABS_AUDIOBOOKS_ROOT}:/audiobooks:ro"
      - "${ABS_PODCASTS_ROOT}:/podcasts:ro"
