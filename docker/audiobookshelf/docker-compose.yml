services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.1  # pinned to running version (2026-06-17)
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "${ABS_HOST_PORT}:80"
    environment:
      - TZ=${TZ}
    volumes:
      - "${ABS_DATA_ROOT}/config:/config"
      - "${ABS_DATA_ROOT}/metadata:/metadata"
      - "${ABS_AUDIOBOOKS_ROOT}:/audiobooks:ro"
      - "${ABS_PODCASTS_ROOT}:/podcasts:ro"
