# Storage VM (VM102) - /etc/samba/smb.conf (sanitized)
# Note: LAN IPs replaced with placeholders. Tailscale range 100.64.0.0/10 is public knowledge.
# Personal names replaced with role-based identifiers.

[global]
   server role = standalone server
   workgroup = WORKGROUP
   security = user
   access based share enum = yes

   # Restrict SMB (445) to trusted hosts: localhost, Tailscale range,
   # VM100 (media) and Proxmox host (LXC mounts).
   hosts allow = 127.0.0.1 100.64.0.0/10 <lan-ip-vm100> <lan-ip-proxmox> <lan-ip-device3>
   hosts deny = 0.0.0.0/0

   bind interfaces only = no

   smb ports = 445
   server min protocol = SMB3_00
   server max protocol = SMB3

   map to guest = never

   log file = /var/log/samba/%m.log
   max log size = 1000

   load printers = no
   disable spoolss = yes

   server signing = mandatory

   passdb backend = tdbsam
   private dir = /var/lib/samba/private

# RW shares (service-specific identities)
[Nextcloud]
   path = /mnt/mergerfs/Nextcloud
   valid users = nextcloud
   read only = no
   force user = storage
   force group = storage
   create mask = 0660
   directory mask = 0770

[Vaultwarden]
   path = /mnt/mergerfs/Vaultwarden
   valid users = vaultwarden
   read only = no
   force user = storage
   force group = storage
   create mask = 0660
   directory mask = 0770

[Paperless]
   path = /mnt/mergerfs/Paperless
