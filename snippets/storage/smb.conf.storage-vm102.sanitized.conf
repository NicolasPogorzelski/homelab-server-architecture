# RO consumer shares (least privilege)
[media-jf]
   path = /mnt/mergerfs
   valid users = media-jf
   read only = yes
   browseable = no

[media-abs]
   path = /mnt/mergerfs
   valid users = media-abs
   read only = yes
   browseable = no

[Books-service]
   path = /mnt/mergerfs/Books
   valid users = books-svc
   read only = yes
   browseable = no

# Gaming shares
[roms]
   path = /mnt/mergerfs/roms
   valid users = roms, roms-admin, storage
   read only = yes
   write list = roms-admin, storage
   force group = roms
   create mask = 0664
   directory mask = 0775

[roms-shield]
   path = /srv/shield
   valid users = roms
   read only = yes
   force group = roms
