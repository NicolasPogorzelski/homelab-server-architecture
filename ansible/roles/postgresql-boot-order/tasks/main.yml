---
- name: Deploy wait-for-tailscale-ip script
  ansible.builtin.copy:
    src: "{{ pg_boot_order_wait_script_src }}"
    dest: "{{ pg_boot_order_wait_script }}"
    owner: root
    group: root
    mode: '0755'

- name: Create systemd drop-in directory for the postgres instance unit
  ansible.builtin.file:
    path: /etc/systemd/system/{{ pg_boot_order_unit }}.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy boot-ordering drop-in (wait for Tailscale IP)
  ansible.builtin.template:
    src: 10-wait-tailscale.conf.j2
    dest: /etc/systemd/system/{{ pg_boot_order_unit }}.d/10-wait-tailscale.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd
