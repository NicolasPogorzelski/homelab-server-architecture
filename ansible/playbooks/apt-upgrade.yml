---
- name: upgrade apt LXCs
  hosts: lxcs
  serial: 1
  remote_user: root

  tasks:
  - name: update apt
    ansible.builtin.apt:
      update_cache: yes

  - name: collect packages pending upgrade
    ansible.builtin.shell: apt-get -s dist-upgrade 2>/dev/null | awk '/^Inst /{print $2}'
    register: packages_pending
    changed_when: false

  - name: upgrade apt
    ansible.builtin.apt:
      upgrade: dist

  - name: clean apt cache
    ansible.builtin.apt:
      clean: yes

  - name: restart tailscaled if tailscale was upgraded
    ansible.builtin.systemd:
      name: tailscaled
      state: restarted
    when: "'tailscale' in packages_pending.stdout"

  - name: collect dpkg integrity results
    ansible.builtin.shell: dpkg --verify 2>&1 | grep -v ' c /' || true
    register: dpkg_verify
    changed_when: false

  - name: fail on corrupt non-conffile packages
    ansible.builtin.fail:
      msg: |
        Binary corruption detected on {{ inventory_hostname }} after upgrade (KE-7).
        Corrupt files:
        {{ dpkg_verify.stdout }}
        Identify packages: dpkg -S <path>
        Fix: apt-get install --reinstall <package>
    when: dpkg_verify.stdout | trim | length > 0

- name: upgrade apt VMs
  hosts: vms
  serial: 1
  become: true
  become_user: root

  tasks:
