---
- name: upgrade apt LXCs
  hosts: lxcs
  serial: 1
  remote_user: root

  tasks:
  - name: update apt
    ansible.builtin.apt:
      update_cache: yes

  - name: upgrade apt
    ansible.builtin.apt:
      upgrade: dist

  - name: clean apt cache
    ansible.builtin.apt:
      clean: yes

- name: upgrade apt VMs
  hosts: vms
  serial: 1
  become: true
  become_user: root

  tasks:
  - name: update apt
    ansible.builtin.apt:
      update_cache: yes

  - name: upgrade apt
    ansible.builtin.apt:
      upgrade: dist

  - name: clean apt cache
    ansible.builtin.apt:
      clean: yes
